<meta charset="UTF-8">

<title>Websiteness — Project Manager</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222536;
    --border: #2e3147;
    --accent: #7c6bf4;
    --accent2: #4ecdc4;
    --text: #e8eaf0;
    --muted: #8b90a8;
    --radius: 10px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
    --sidebar-w: 210px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    position: sticky; top: 0; z-index: 100;
  }
  .logo { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; color: var(--muted); }
  .logo span { color: var(--text); }
  .logo em { color: var(--muted); font-style: normal; font-weight: 400; }

  .layout { display: flex; height: calc(100vh - 49px); }

  aside {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px 0 24px;
  }
  .sidebar-item {
    display: flex; align-items: center; gap: 9px;
    padding: 8px 16px;
    font-size: 13px; color: var(--muted);
    cursor: pointer; border: none; background: none;
    width: 100%; text-align: left;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    transition: background 0.12s, color 0.12s;
  }
  .sidebar-item:hover { background: var(--surface2); color: var(--text); }
  .sidebar-item.active { background: rgba(124,107,244,0.12); color: var(--accent); font-weight: 600; }
  .sidebar-item .icon { font-size: 14px; flex-shrink: 0; }

  main { flex: 1; overflow-y: auto; padding: 28px 32px; background: var(--bg); }

  .tabs {
    display: flex; gap: 2px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }
  .tab-btn {
    padding: 9px 18px;
    font-size: 13px; font-weight: 600;
    color: var(--muted);
    background: none; border: none;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  .hero-link {
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(135deg, rgba(124,107,244,0.15), rgba(78,205,196,0.08));
    border: 1px solid rgba(124,107,244,0.35);
    border-radius: var(--radius);
    padding: 18px 22px;
    text-decoration: none; color: var(--text);
    margin-bottom: 28px;
    transition: border-color 0.15s, transform 0.1s;
  }
  .hero-link:hover { border-color: var(--accent); transform: translateY(-1px); }
  .hero-link .hl-left { display: flex; align-items: center; gap: 14px; }
  .hero-link .hl-icon {
    width: 40px; height: 40px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .hero-link .hl-title { font-size: 16px; font-weight: 700; }
  .hero-link .hl-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .hero-link .hl-arrow { font-size: 20px; color: var(--accent); opacity: 0.7; }

  .section { margin-bottom: 28px; }
  .section-title {
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.7px;
    color: var(--muted); margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 10px; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    text-decoration: none; color: var(--text);
    display: flex; flex-direction: column; gap: 5px;
    transition: border-color 0.15s, transform 0.1s, box-shadow 0.15s;
  }
  .card:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: var(--shadow); }
  .card-name { font-size: 13px; font-weight: 500; line-height: 1.4; display: flex; align-items: center; gap: 7px; }

  .client-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 8px;
  }
  .client-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 11px 14px;
    font-size: 13px; font-weight: 600;
    color: var(--text); cursor: pointer;
    text-align: left;
    display: flex; align-items: center; gap: 8px;
    transition: border-color 0.15s, transform 0.1s;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .client-btn:hover { border-color: var(--accent); transform: translateY(-1px); }
  .client-btn .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }

  .back-btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: none; border: none;
    color: var(--muted); font-size: 13px; cursor: pointer;
    padding: 0; margin-bottom: 20px;
    transition: color 0.15s;
  }
  .back-btn:hover { color: var(--accent); }

  .client-detail-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 10px;
  }
  .client-detail-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    text-decoration: none; color: var(--text);
    display: flex; flex-direction: column; gap: 6px;
    transition: border-color 0.15s, transform 0.1s;
  }
  .client-detail-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .cdc-icon { font-size: 20px; }
  .cdc-name { font-size: 13px; font-weight: 600; }

  .state-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 8px;
  }
  .state-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 13px; font-weight: 600;
    color: var(--text); cursor: pointer;
    text-align: left;
    display: flex; align-items: center; justify-content: space-between;
    transition: border-color 0.15s;
  }
  .state-btn:hover { border-color: var(--accent); }
  .state-count { font-size: 11px; color: var(--muted); font-weight: 400; }

  .site-list { display: flex; flex-direction: column; gap: 6px; }
  .site-link {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 14px;
    font-size: 13px; color: var(--text);
    text-decoration: none;
    display: flex; align-items: center; gap: 8px;
    transition: border-color 0.15s;
  }
  .site-link:hover { border-color: var(--accent); }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Modal overlay ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 999;
    background: var(--bg);
    flex-direction: column;
  }
  .modal-overlay.open { display: flex; }
  .modal-bar {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .modal-back {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 7px; padding: 6px 12px;
    font-size: 13px; font-weight: 600; color: var(--text);
    cursor: pointer; transition: border-color 0.15s, color 0.15s;
  }
  .modal-back:hover { border-color: var(--accent); color: var(--accent); }
  .modal-title { font-size: 13px; color: var(--muted); }
  .modal-frame { flex: 1; border: none; width: 100%; background: #fff; }
</style>
</head>

function closeModal() {
  const overlay = document.getElementById('modalOverlay');
  overlay.classList.remove('open');
  document.getElementById('modalFrame').src = '';
}

// ── STATE ──
let view = localStorage.getItem('belen_view') || 'home';
let clientDetailName = null;
let lgTab = 'assigned';
let lgStateOpen = null;

function navigate(v) {
  view = v; clientDetailName = null; lgStateOpen = null;
  localStorage.setItem('belen_view', v);
  render();
}

// ── SIDEBAR ──
function renderSidebar() {
  document.getElementById('sidebar').innerHTML = `
    <button class="sidebar-item ${view==='home'?'active':''}" onclick="navigate('home')">
      <span class="icon">🏠</span> Assigned to Me
    </button>
    <button class="sidebar-item ${view==='pm'?'active':''}" onclick="navigate('pm')">
      <span class="icon">⚙️</span> PM Workspace
    </button>
    <button class="sidebar-item ${view==='clients'?'active':''}" onclick="navigate('clients')">
      <span class="icon">👥</span> Active Clients
    </button>
    <button class="sidebar-item ${view==='lg'?'active':''}" onclick="navigate('lg')">
      <span class="icon">📍</span> LG Sites
    </button>
    <button class="sidebar-item ${view==='playbook'?'active':''}" onclick="navigate('playbook')">
      <span class="icon">🏛️</span> Internal Playbook
    </button>
  `;
}

// ── CARD HELPERS ──
function splitEmoji(name) {
  const m = name.match(/^(\p{Emoji_Presentation}[️‍\p{Emoji_Presentation}]*)\s*(.*)/u);
  if (m) return { emoji: m[1], label: m[2] };
  return { emoji: null, label: name };
}

function card(item) {
  const { emoji, label } = splitEmoji(item.name);
  const inner = emoji
    ? `<span style="font-size:16px;line-height:1;flex-shrink:0">${emoji}</span><span>${label}</span>`
    : `<span>${label}</span>`;
  if (item.sameTab) {
    const safeUrl = item.url.replace(/'/g, "\\'");
    const safeLabel = label.replace(/'/g, "\\'");
    return `<button class="card" onclick="openModal('${safeUrl}','${safeLabel}')" style="text-align:left;cursor:pointer;">
      <div class="card-name">${inner}</div>
    </button>`;
  }
  return `<a class="card" href="${item.url}" target="_blank" rel="noopener">
    <div class="card-name">${inner}</div>
  </a>`;
}

// ── VIEWS ──
function renderHome() {
  return `
    <a class="hero-link" href="${BELEN.assignedToMe.url}" target="_blank" rel="noopener">
      <div class="hl-left">
        <div class="hl-icon">🏠</div>
        <div>
          <div class="hl-title">Assigned to Me</div>
          <div class="hl-sub">Your active task list</div>
        </div>
      </div>
      <div class="hl-arrow">↗</div>
    </a>
    <div class="section">
      <div class="section-title">Create a Task</div>
      <div class="cards">${BELEN.createTasks.map(card).join('')}</div>
    </div>
    <div class="section">
      <div class="section-title">Additional</div>
      <div class="cards">${BELEN.additional.map(card).join('')}</div>
    </div>`;
}

function renderPM() {
  return `
    <div class="section">
      <div class="section-title">View All Tasks</div>
      <div class="cards">${PM_WORKSPACE.tasks.map(card).join('')}</div>
    </div>
    <div class="section">
      <div class="section-title">Additional Resources</div>
      <div class="cards">${PM_WORKSPACE.resources.map(card).join('')}</div>
    </div>`;
}

function renderClients() {
  if (clientDetailName) {
    const client = ACTIVE_CLIENTS.find(c => c.name === clientDetailName);
    return `
      <button class="back-btn" onclick="clientDetailName=null;render()">← Active Clients</button>
      <div class="section">
        <div class="section-title">${client.name}</div>
        <div class="client-detail-grid">
          ${client.items.map(i => `
            <a class="client-detail-card" href="${i.url}" target="_blank" rel="noopener">
              <div class="cdc-icon">${i.icon}</div>
              <div class="cdc-name">${i.name}</div>
            </a>
          `).join('')}
        </div>
      </div>`;
  }
  return `
    <div class="section">
      <div class="section-title">Active Clients <span style="font-weight:400;font-size:11px;margin-left:4px;color:var(--muted)">${ACTIVE_CLIENTS.length} clients</span></div>
      <div class="client-grid">
        ${ACTIVE_CLIENTS.map(c => `
          <button class="client-btn" onclick="clientDetailName='${c.name.replace(/'/g,"\\'")}';render()">
            <span class="dot"></span>${c.name}
          </button>
        `).join('')}
      </div>
    </div>`;
}

function renderLG() {
  const tabs = `
    <div class="tabs">
      <button class="tab-btn ${lgTab==='assigned'?'active':''}" onclick="lgTab='assigned';lgStateOpen=null;render()">LG Assigned</button>
      <button class="tab-btn ${lgTab==='unassigned'?'active':''}" onclick="lgTab='unassigned';lgStateOpen=null;render()">LG Unassigned</button>
    </div>`;
  const data = lgTab === 'assigned' ? LG_ASSIGNED : LG_UNASSIGNED;
  if (lgStateOpen) {
    const folder = data.find(f => f.state === lgStateOpen);
    return tabs + `
      <button class="back-btn" onclick="lgStateOpen=null;render()">← LG ${lgTab==='assigned'?'Assigned':'Unassigned'}</button>
      <div class="section">
        <div class="section-title">${folder.state} <span style="font-weight:400;font-size:11px;color:var(--muted)">${folder.sites.length} site${folder.sites.length!==1?'s':''}</span></div>
        <div class="site-list">
          ${folder.sites.map(s => `<a class="site-link" href="${s.url}" target="_blank" rel="noopener">${s.name}</a>`).join('')}
        </div>
      </div>`;
  }
  return tabs + `
    <div class="section">
      <div class="section-title">${lgTab==='assigned'?'States':'Folders'}</div>
      <div class="state-grid">
        ${data.map(f => `
          <button class="state-btn" onclick="lgStateOpen='${f.state.replace(/'/g,"\\'")}';render()">
            ${f.state} <span class="state-count">${f.sites.length}</span>
          </button>
        `).join('')}
      </div>
    </div>`;
}

function renderPlaybook() {
  return `
    <div class="section">
      <div class="section-title">Internal Playbook</div>
      <div class="cards">${INTERNAL_PLAYBOOK.map(card).join('')}</div>
    </div>`;
}

// ── RENDER ──
function render() {
  renderSidebar();
  let content = '';
  if (view === 'home')         content = renderHome();
  else if (view === 'pm')      content = renderPM();
  else if (view === 'clients') content = renderClients();
  else if (view === 'lg')      content = renderLG();
  else if (view === 'playbook')content = renderPlaybook();
  document.getElementById('main').innerHTML = content;
}

render();
</script>
</body>
</html>
